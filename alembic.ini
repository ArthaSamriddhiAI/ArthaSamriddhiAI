[alembic]
# Path to migration scripts (relative to repo root)
script_location = alembic

# Template used to generate revision files
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone for revision filenames
timezone = UTC

# Path separator (: on POSIX, ; on Windows)
path_separator = os

# DB URL — overridden via environment variable ARTHA_DATABASE_URL in alembic/env.py
# Default falls back to local SQLite for developer ergonomics.
sqlalchemy.url = sqlite+aiosqlite:///./artha.db

# Logging configuration kept minimal; Alembic respects standard Python logging.
[post_write_hooks]
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
